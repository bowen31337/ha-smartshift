openapi: 3.0.3
info:
  title: AISWEI ASW12kH-T3 Local Inverter API
  description: |
    Local HTTPS API for the AISWEI ASW12kH-T3 12kW hybrid solar inverter.
    Hosted on the inverter's embedded ESP32 WiFi module (Ai-Dongle LAN/WLAN, BA1300-30).

    **Connection:**
    - Host: `10.0.0.6` (LAN IP, may vary)
    - Protocol: HTTPS port 443 (self-signed certificate — disable SSL verification)
    - Authentication: None (open local API)
    - The inverter goes offline overnight (no solar) and wakes at sunrise

    **Device type codes for /getdev.cgi and /getdevdata.cgi:**
    | device | Description |
    |--------|-------------|
    | 1      | 404 — not found |
    | 2      | Inverter (AC output, MPPT, temperature, PV strings) |
    | 3      | Grid meter / CT clamp (grid power, per-phase, export/import totals) |
    | 4      | Battery pack (charge/discharge, SoC, SoH, voltage) |
    | 5      | Dongle info (device=5 and device=6 both return dongle/WiFi metadata) |
    | 6      | Dongle info (same as device=5) |

    **Serial numbers (this unit):**
    - Inverter SN: `OE012K01Z2610013`
    - Battery SN: `20030261080011`
    - Dongle PSN: `BA100D6100C3`
    - Dongle MAC (ETH): `88:57:21:B9:0C:80`
    - Dongle MAC (WiFi): `88:57:21:B9:0C:83`

    **Confirmed working endpoints (probed 2026-03-31):**
    - GET /getdev.cgi?device=2 — Inverter metadata
    - GET /getdev.cgi?device=3 — Grid meter config (mode, limits, G100 params)
    - GET /getdev.cgi?device=4 — Battery pack static info
    - GET /getdev.cgi?device=5 — Dongle info (same as device=6)
    - GET /getdev.cgi?device=6 — Dongle info (same as device=5)
    - GET /getdevdata.cgi?device=2&sn=OE012K01Z2610013 — Live inverter data
    - GET /getdevdata.cgi?device=3 — Live meter data
    - GET /getdevdata.cgi?device=4&sn=OE012K01Z2610013 — Live battery data
    - GET /getdevdata.cgi?device=5 — Diesel/generator stub (all zeros)
    - GET /getdefine.cgi — Schedule config (TOU windows, Pin/Pout limits)
    - POST /setting.cgi — Write settings (returns error if no valid body)

    **404 endpoints (confirmed not implemented):**
    getrundata, getlog, getalarm, getversion, gettime, getnet, getwifi,
    getsched, getschedule, getbattery, getinv, getparam, getstatus,
    getinfo, getconfig, getdata, getmeter, getdevdata?device=1, getdevdata?device=6

  version: "1.1.0"
  contact:
    name: Bowen Li
    email: bowen31337@outlook.com

servers:
  - url: https://10.0.0.6
    description: Local inverter (LAN only, self-signed cert)

paths:

  /getdev.cgi:
    get:
      summary: Get device metadata and static configuration
      description: |
        Returns static device info. Response schema varies by `device` parameter.
        - device=2: inverter model, SN, firmware versions, battery topology
        - device=3: grid meter mode, G100 parameters, power limit config
        - device=4: battery static specs (capacity, cell config, firmware)
        - device=5/6: dongle/WiFi module info (both return same data)
        - device=1: 404 not found
      parameters:
        - name: device
          in: query
          required: true
          schema:
            type: integer
            enum: [2, 3, 4, 5, 6]
          description: Device type
      responses:
        "200":
          description: Device metadata (schema varies by device)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DeviceInfoInverter'
                  - $ref: '#/components/schemas/DeviceInfoMeter'
                  - $ref: '#/components/schemas/DeviceInfoBattery'
                  - $ref: '#/components/schemas/DeviceInfoDongle'
              examples:
                device2:
                  summary: device=2 (inverter)
                  value:
                    inv:
                      - isn: "OE012K01Z2610013"
                        add: 3
                        safety: 55
                        rate: 12000
                        msw: "V610-05001-20.000"
                        ssw: "V610-60015-00"
                        tsw: "V610-11022-15"
                        pac: 570
                        etd: 36
                        eto: -201
                        err: 0
                        cmv: "V2.1.8"
                        mty: 13
                        typ: 3
                        stu: 1
                        model: "ASW12kH-T3"
                        Isw: "V610-50097-08.000"
                        afci: ""
                        battery_topo:
                          - bat_sn: "20030261080011"
                            bat_id: 1
                            bat_sw_ver: "V610-90002-12"
                        host: 0
                    num: 1
                device3:
                  summary: device=3 (meter config)
                  value:
                    mod: 6
                    enb: 1
                    exp_m: 0
                    regulate: 5
                    enb_PF: 0
                    target_PF: 0
                    in_cur_g100: 630
                    out_cur_g100: 0
                    usage_type_g100: 0
                    com_interruption_enable_g100: 0
                    power_limit_mode: 0
                    billing_method: 0
                    abs: 0
                    abs_offset: 0
                    sec_enb: 1
                    sec_mod: 7
                    sec_meter_location: 0
                    sec_addr: 2
                    total_pac: 570
                    total_fac: 12000
                    meter_pac: 18
                device4:
                  summary: device=4 (battery static)
                  value:
                    isn: "OE012K01Z2610013"
                    stu_r: 1
                    type: 1
                    mod_r: 2
                    muf: 5
                    mod: 9
                    num: 3
                    discharge_max: 10
                    charge_max: 100
                    battery:
                      bid: 0
                      devtype: "9"
                      manufactoty: "AISWEI"
                      partno: "20030261080011"
                      modeltotal: 6
                      monomertotoal: 96
                      monomerinmodel: 16
                      ratedvoltage: 3072
                      capacity: 150
                      hardwarever: "V1.0"
                      softwarever: "V610-90002-12"
                device5:
                  summary: device=5 (dongle info)
                  value:
                    psn: "BA100D6100C3"
                    key: "BQ9SDLGFXHPKHYA7"
                    typ: 12
                    nam: "Ai-Dongle LAN/WLAN"
                    mod: "BA1300-30"
                    muf: "AISWEI"
                    brd: "AISWEI"
                    hw: "M11"
                    sw: "V610-09578-03.000"
                    wsw: "ESP32-WROVER-IE"
                    vcs: "V1.00.000"
                    tim: "2026-03-31 06:30:35"
                    pdk: "a2YDqmCYWpI"
                    ser: "436f8d1a9491d5943fd5ae67c59c9e29"
                    protocol: "V2.2"
                    ali_ip: "ap-southeast-1"
                    ali_port: 8883
                    status: 0
                    parallel: 0
                    ssc: 0
                    ap_chn: 0
                    heap_left: 3960507
                    min_heap_left: 3844635
                    inv_stack_left: 10020
                    cld_stack_left: 13152
                    led_stack_left: 4376
                    upgrade_percent: 0
                    ethmac: "88:57:21:B9:0C:80"
                    wlnmac: "88:57:21:B9:0C:83"
                    func_mask: 17
                    max_meter_num: 2
        "404":
          description: Device not found (device=1 always 404)

  /getdevdata.cgi:
    get:
      summary: Get real-time device sensor data
      description: |
        Returns live sensor readings. Poll every 30 seconds recommended.
        Response schema varies by `device` parameter.
        - device=2: inverter live data (requires sn=)
        - device=3: grid meter live data (no sn needed)
        - device=4: battery live data (requires sn=)
        - device=5: diesel/generator stub (all zeros on this unit)
        - device=1/6: 404 not found
      parameters:
        - name: device
          in: query
          required: true
          schema:
            type: integer
            enum: [2, 3, 4, 5]
          description: |
            Device to query:
            - `2` = Inverter (requires `sn` parameter)
            - `3` = Grid meter / CT clamp (no `sn` needed)
            - `4` = Battery pack (requires `sn` parameter)
            - `5` = Diesel/generator (all zeros on this unit)
        - name: sn
          in: query
          required: false
          schema:
            type: string
          description: |
            Inverter serial number. Required for device=2 and device=4.
            Example: `OE012K01Z2610013`
      responses:
        "200":
          description: Real-time sensor data (schema depends on device)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InverterData'
                  - $ref: '#/components/schemas/MeterData'
                  - $ref: '#/components/schemas/BatteryData'
                  - $ref: '#/components/schemas/DieselData'
