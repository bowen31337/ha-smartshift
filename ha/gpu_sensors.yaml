# GPU Stats Sensors for Home Assistant
# Reads from /ha-smartshift/.gpu_stats.json (polled by systemd timer)
# Requires: scripts/poll_gpu_stats.sh running as systemd user timer

# --- Add to command_line: section in configuration.yaml ---

command_line:
  - sensor:
      name: "Miner Total Power"
      unique_id: miner_total_power
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['total_power_w'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      scan_interval: 60
      value_template: "{{ value | float(0) | round(1) }}"
      icon: mdi:pickaxe
  - sensor:
      name: "Miner Service Status"
      unique_id: miner_service_status
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['miner_status'])\" 2>/dev/null || echo unknown"
      scan_interval: 60
      icon: mdi:cog

  # GPU 0 - RTX 3090 (24 GB)
  - sensor:
      name: "GPU0 Temperature"
      unique_id: gpu0_temperature
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][0]['temp'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "°C"
      device_class: temperature
      scan_interval: 60
      icon: mdi:thermometer
  - sensor:
      name: "GPU0 Power"
      unique_id: gpu0_power
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][0]['power'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "W"
      device_class: power
      scan_interval: 60
      icon: mdi:flash
  - sensor:
      name: "GPU0 Utilization"
      unique_id: gpu0_util
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][0]['util'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 60
      icon: mdi:gauge
  - sensor:
      name: "GPU0 Memory"
      unique_id: gpu0_memory
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(round(d['gpus'][0]['mem_used']/1024,1))\" 2>/dev/null || echo 0"
      unit_of_measurement: "GB"
      scan_interval: 60
      icon: mdi:memory

  # GPU 1 - RTX 3080 (10 GB)
  - sensor:
      name: "GPU1 Temperature"
      unique_id: gpu1_temperature
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][1]['temp'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "°C"
      device_class: temperature
      scan_interval: 60
      icon: mdi:thermometer
  - sensor:
      name: "GPU1 Power"
      unique_id: gpu1_power
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][1]['power'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "W"
      device_class: power
      scan_interval: 60
      icon: mdi:flash
  - sensor:
      name: "GPU1 Utilization"
      unique_id: gpu1_util
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][1]['util'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 60
      icon: mdi:gauge
  - sensor:
      name: "GPU1 Memory"
      unique_id: gpu1_memory
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(round(d['gpus'][1]['mem_used']/1024,1))\" 2>/dev/null || echo 0"
      unit_of_measurement: "GB"
      scan_interval: 60
      icon: mdi:memory

  # GPU 2 - RTX 2070 SUPER (8 GB)
  - sensor:
      name: "GPU2 Temperature"
      unique_id: gpu2_temperature
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][2]['temp'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "°C"
      device_class: temperature
      scan_interval: 60
      icon: mdi:thermometer
  - sensor:
      name: "GPU2 Power"
      unique_id: gpu2_power
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][2]['power'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "W"
      device_class: power
      scan_interval: 60
      icon: mdi:flash
  - sensor:
      name: "GPU2 Utilization"
      unique_id: gpu2_util
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['gpus'][2]['util'])\" 2>/dev/null || echo 0"
      unit_of_measurement: "%"
      scan_interval: 60
      icon: mdi:gauge
  - sensor:
      name: "GPU2 Memory"
      unique_id: gpu2_memory
      command: "cat /ha-smartshift/.gpu_stats.json 2>/dev/null | python3 -c \"import json,sys; d=json.load(sys.stdin); print(round(d['gpus'][2]['mem_used']/1024,1))\" 2>/dev/null || echo 0"
