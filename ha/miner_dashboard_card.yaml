# Lovelace Dashboard - GPU Miner View
# Add as a new view in your HA dashboard

title: "⛏️ GPU Miner"
path: miner
icon: mdi:pickaxe
cards:
  - type: entities
    title: Miner Control
    show_header_toggle: false
    entities:
      - entity: input_boolean.miner_enabled
        name: Enable Miner
      - entity: sensor.miner_logic_mode
        name: Logic Mode
      - entity: sensor.miner_should_run
        name: Should Run?
      - entity: sensor.miner_stop_condition
        name: Stop Condition
      - entity: sensor.miner_service_status
        name: Service Status
      - entity: sensor.miner_total_power
        name: Total GPU Power

  - type: entities
    title: Automation State
    entities:
      - entity: sensor.battery_soc
        name: Battery SOC
      - entity: sensor.solar_pv_power_3
        name: Solar Power
      - entity: sun.sun
        name: Sun
      - entity: automation.miner_start_battery_aware
        name: Start Automation
      - entity: automation.miner_stop_battery_aware
        name: Stop Automation

  - type: glance
    title: Total Miner Load
    entities:
      - entity: sensor.miner_total_power
        name: Total W
      - entity: sensor.gpu0_power
        name: GPU0 W
      - entity: sensor.gpu1_power
        name: GPU1 W
      - entity: sensor.gpu2_power
        name: GPU2 W

  - type: entities
    title: "GPU 0 — RTX 3090 (24 GB)"
    entities:
      - entity: sensor.gpu0_temperature
        name: Temperature
        icon: mdi:thermometer
      - entity: sensor.gpu0_power
        name: Power Draw
        icon: mdi:flash
      - entity: sensor.gpu0_utilization
        name: Utilization
        icon: mdi:gauge
      - entity: sensor.gpu0_memory
        name: Memory Used
        icon: mdi:memory

  - type: entities
    title: "GPU 1 — RTX 3080 (10 GB)"
    entities:
      - entity: sensor.gpu1_temperature
        name: Temperature
        icon: mdi:thermometer
      - entity: sensor.gpu1_power
        name: Power Draw
        icon: mdi:flash
      - entity: sensor.gpu1_utilization
        name: Utilization
        icon: mdi:gauge
      - entity: sensor.gpu1_memory
        name: Memory Used
        icon: mdi:memory

  - type: entities
    title: "GPU 2 — RTX 2070 SUPER (8 GB)"
    entities:
      - entity: sensor.gpu2_temperature
        name: Temperature
        icon: mdi:thermometer
      - entity: sensor.gpu2_power
        name: Power Draw
        icon: mdi:flash
      - entity: sensor.gpu2_utilization
        name: Utilization
        icon: mdi:gauge
      - entity: sensor.gpu2_memory
        name: Memory Used
        icon: mdi:memory

  - type: history-graph
    title: GPU Power History (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.miner_total_power
        name: Total
      - entity: sensor.gpu0_power
        name: GPU0
      - entity: sensor.gpu1_power
        name: GPU1
      - entity: sensor.gpu2_power
        name: GPU2

  - type: history-graph
    title: GPU Temperatures (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.gpu0_temperature
        name: GPU0
      - entity: sensor.gpu1_temperature
        name: GPU1
      - entity: sensor.gpu2_temperature
        name: GPU2
