# HA Miner Automation for ha-smartshift
# Battery-aware GPU mining with solar fallback
#
# Primary logic (battery API available):
#   - Start: SOC >= 95% (battery full, excess solar going to waste)
#   - Stop:  SOC < 90% (5% hysteresis prevents flapping)
#
# Fallback logic (battery API unavailable):
#   - Start: sun above horizon AND solar > 2000W
#   - Stop:  sun below horizon OR solar < 500W
#
# Master toggle: input_boolean.miner_enabled

# --- Add to configuration.yaml ---

input_boolean:
  miner_enabled:
    name: "GPU Miner Enabled"
    icon: mdi:pickaxe

# --- Add to template: sensor: section ---

template:
  - sensor:
      - name: "Miner Should Run"
        unique_id: miner_should_run
        state: >-
          {% set soc_raw = states('sensor.battery_soc') %}
          {% set enabled = is_state('input_boolean.miner_enabled', 'on') %}
          {% if not enabled %}
            False
          {% elif soc_raw not in ['unavailable', 'unknown', 'None', 'none'] %}
            {% set soc = soc_raw | float(0) %}
            {{ soc >= 95 }}
          {% else %}
            {% set solar = states('sensor.solar_pv_power_3') | float(0) %}
            {% set is_day = is_state('sun.sun', 'above_horizon') %}
            {{ is_day and solar > 2000 }}
          {% endif %}
      - name: "Miner Stop Condition"
        unique_id: miner_stop_condition
        state: >-
          {% set soc_raw = states('sensor.battery_soc') %}
          {% set enabled = is_state('input_boolean.miner_enabled', 'on') %}
          {% if not enabled %}
            True
          {% elif soc_raw not in ['unavailable', 'unknown', 'None', 'none'] %}
            {% set soc = soc_raw | float(0) %}
            {{ soc < 90 }}
          {% else %}
            {% set solar = states('sensor.solar_pv_power_3') | float(0) %}
            {% set is_night = is_state('sun.sun', 'below_horizon') %}
            {{ is_night or solar < 500 }}
          {% endif %}
      - name: "Miner Logic Mode"
        unique_id: miner_logic_mode
        state: >-
          {% set soc_raw = states('sensor.battery_soc') %}
          {% if soc_raw not in ['unavailable', 'unknown', 'None', 'none'] %}
            battery
          {% else %}
            solar_fallback
          {% endif %}

# --- Add to shell_command: section ---

shell_command:
  miner_start: "ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i /config/.ssh/id_ed25519_alexchen peter@10.0.0.30 'sudo systemctl start miner_scheduler'"
  miner_stop: "ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i /config/.ssh/id_ed25519_alexchen peter@10.0.0.30 'sudo systemctl stop miner_scheduler'"
  miner_status: "ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i /config/.ssh/id_ed25519_alexchen peter@10.0.0.30 'systemctl is-active miner_scheduler'"

# --- Add to automations.yaml ---

automation:
  - id: miner_start_battery_aware
    alias: Miner Start Battery Aware
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id: sensor.miner_should_run
        to: "True"
    condition:
      - condition: state
        entity_id: sensor.miner_should_run
        state: "True"
    action:
      - service: shell_command.miner_start

  - id: miner_stop_battery_aware
    alias: Miner Stop Battery Aware
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id: sensor.miner_stop_condition
        to: "True"
    condition:
      - condition: state
        entity_id: sensor.miner_stop_condition
        state: "True"
    action:
      - service: shell_command.miner_stop
